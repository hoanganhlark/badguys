name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ✅ Setup Node (for Vite build)
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # ✅ Install dependencies
      - name: Install dependencies
        run: npm ci

      # ✅ Create .env from ONE secret
      - name: Create .env
        run: echo "${{ secrets.ENV_FILE }}" > .env

      # ✅ Inject dynamic version
      - name: Inject build version
        run: echo "VITE_APP_VERSION=v$(date -u +%Y.%m.%d).${{ github.run_number }}" >> .env

      # ✅ Build React (Vite)
      - name: Build
        run: npm run build

      # ✅ Setup GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # ✅ Upload built app (IMPORTANT: dist folder)
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      # ✅ Deploy
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ✅ Notify success
      - name: Notify Telegram version bump
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
          DEPLOYED_URL: ${{ steps.deployment.outputs.page_url }}
        run: |
          VERSION="v$(date -u +%Y.%m.%d).${{ github.run_number }}"

          if [ -n "$DEPLOYED_URL" ]; then
            MSG=$(printf 'BadGuys app bumped to %s 🚀\nURL: %s' "$VERSION" "$DEPLOYED_URL")
          else
            MSG="BadGuys app bumped to $VERSION 🚀"
          fi

          curl -s -X POST https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage \
            -d chat_id=$TELEGRAM_GROUP_CHAT_ID \
            --data-urlencode text="$MSG"

      # ❌ Notify failure
      - name: Notify Telegram deploy failure
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          MSG="BadGuys deploy failed on ${{ github.ref_name }}. Run: $RUN_URL"

          curl -s -X POST https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage \
            -d chat_id=$TELEGRAM_GROUP_CHAT_ID \
            --data-urlencode text="$MSG" || echo "Telegram failure notify could not be sent."
