name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject deployment version
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
        run: |
          VERSION="v$(date -u +%Y.%m.%d).${{ github.run_number }}"
          sed -i "s|const APP_VERSION = \".*\";|const APP_VERSION = \"$VERSION\";|" index.html
          sed -i "s|const TELEGRAM_BOT_TOKEN = \".*\";|const TELEGRAM_BOT_TOKEN = \"$TELEGRAM_BOT_TOKEN\";|" index.html
          sed -i "s|const TELEGRAM_GROUP_CHAT_ID = \".*\";|const TELEGRAM_GROUP_CHAT_ID = \"$TELEGRAM_GROUP_CHAT_ID\";|" index.html
          echo "Deployment version: $VERSION"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Telegram version bump
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
        run: |
          VERSION=$(grep -oP 'const APP_VERSION = "\K[^"]+' index.html)
          MSG="BadGuys app bumped to $VERSION 🚀"
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d '{"chat_id": "'${TELEGRAM_GROUP_CHAT_ID}'", "text": "'${MSG}'"}'
