name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject deployment version
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
          BADGUY_FEMALE_MAX: ${{ vars.BADGUY_FEMALE_MAX || '' }}
          BADGUY_TUBE_PRICE: ${{ vars.BADGUY_TUBE_PRICE || '' }}
          BADGUY_SET_PRICE: ${{ vars.BADGUY_SET_PRICE || '' }}
          BADGUY_SHUTTLES_PER_TUBE: ${{ vars.BADGUY_SHUTTLES_PER_TUBE || '' }}
          BADGUY_ROUND_RESULT: ${{ vars.BADGUY_ROUND_RESULT || '' }}
        run: |
          VERSION="v$(date -u +%Y.%m.%d).${{ github.run_number }}"

          FEMALE_MAX="${BADGUY_FEMALE_MAX:-60}"
          TUBE_PRICE="${BADGUY_TUBE_PRICE:-290}"
          SET_PRICE="${BADGUY_SET_PRICE:-12}"
          SHUTTLES_PER_TUBE="${BADGUY_SHUTTLES_PER_TUBE:-12}"
          ROUND_RESULT="${BADGUY_ROUND_RESULT:-true}"

          sed -i "s|appVersion: \".*\"|appVersion: \"$VERSION\"|" index.html
          sed -i "s|telegramBotToken: \".*\"|telegramBotToken: \"$TELEGRAM_BOT_TOKEN\"|" index.html
          sed -i "s|telegramGroupChatId: \".*\"|telegramGroupChatId: \"$TELEGRAM_GROUP_CHAT_ID\"|" index.html
          sed -i "s|femaleMax: \".*\"|femaleMax: \"$FEMALE_MAX\"|" index.html
          sed -i "s|tubePrice: \".*\"|tubePrice: \"$TUBE_PRICE\"|" index.html
          sed -i "s|setPrice: \".*\"|setPrice: \"$SET_PRICE\"|" index.html
          sed -i "s|shuttlesPerTube: \".*\"|shuttlesPerTube: \"$SHUTTLES_PER_TUBE\"|" index.html
          sed -i "s|roundResult: \".*\"|roundResult: \"$ROUND_RESULT\"|" index.html
          echo "Deployment version: $VERSION"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Notify Telegram version bump
        if: success()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_GROUP_CHAT_ID: ${{ secrets.TELEGRAM_GROUP_CHAT_ID }}
        run: |
          VERSION=$(grep -oP 'appVersion: "\K[^"]+' index.html || echo "")
          if [ -z "$VERSION" ]; then
            VERSION="unknown"
          fi
          MSG="BadGuys app bumped to $VERSION 🚀"
          if [ -n "$MSG" ]; then
            curl -s -X POST https://api.telegram.org/bot$TELEGRAM_BOT_TOKEN/sendMessage \
              -d chat_id=$TELEGRAM_GROUP_CHAT_ID \
              -d text="$MSG"
          else
            echo "Skip Telegram notify: message is empty."
          fi
