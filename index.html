<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BadGuys</title>
    <link rel="icon" type="image/png" href="./assets/imgs/logo.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/styles.css" />
  </head>
  <body class="p-5 md:p-12 relative">
    <div class="max-w-md mx-auto">
      <button
        onclick="toggleConfigPanel(true)"
        aria-label="Mở cấu hình"
        class="fixed top-5 left-5 md:top-8 md:left-8 z-30 h-10 w-10 rounded-full border border-slate-200 bg-white text-slate-600 shadow-sm hover:bg-slate-50 transition-colors flex items-center justify-center"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          class="h-5 w-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4.5 12a2.5 2.5 0 0 0 .6 1.62l-.06.14a2 2 0 0 0 .45 2.24l.3.3a2 2 0 0 0 2.24.45l.14-.06a2.5 2.5 0 0 0 3.24 1.47h1.18a2.5 2.5 0 0 0 3.24-1.47l.14.06a2 2 0 0 0 2.24-.45l.3-.3a2 2 0 0 0 .45-2.24l-.06-.14A2.5 2.5 0 0 0 19.5 12a2.5 2.5 0 0 0-.6-1.62l.06-.14a2 2 0 0 0-.45-2.24l-.3-.3a2 2 0 0 0-2.24-.45l-.14.06A2.5 2.5 0 0 0 12.59 5h-1.18a2.5 2.5 0 0 0-3.24 1.47l-.14-.06a2 2 0 0 0-2.24.45l-.3.3a2 2 0 0 0-.45 2.24l.06.14A2.5 2.5 0 0 0 4.5 12Z"
          />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </button>

      <!-- Minimal Header -->
      <header class="mb-12 text-center">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">
          BadGuys<span class="text-slate-400">.</span>
        </h1>
      </header>

      <!-- Section 1: Expenses -->
      <section class="mb-8">
        <h2
          class="text-sm font-semibold text-slate-500 mb-4 px-1 uppercase tracking-wider"
        >
          Chi phí (k)
        </h2>
        <div class="grid grid-cols-2 gap-3">
          <input
            type="number"
            id="courtFee"
            placeholder="Tiền sân"
            class="input-minimal px-4 py-3 text-sm font-medium w-full"
            oninput="calculate()"
          />
          <input
            type="number"
            id="shuttleCount"
            placeholder="Số cầu"
            class="input-minimal px-4 py-3 text-sm font-medium w-full"
            oninput="calculate()"
          />
        </div>
      </section>

      <!-- Section 2: Players -->
      <section class="mb-8">
        <div class="flex justify-between items-center mb-4 px-1">
          <h2
            class="text-sm font-semibold text-slate-500 uppercase tracking-wider"
          >
            Danh sách
          </h2>
          <span id="playerCounter" class="text-xs font-medium text-slate-400"
            >0 người</span
          >
        </div>

        <textarea
          id="bulkInput"
          rows="4"
          placeholder="Nhập tên...&#10;Thêm: n (nữ), 2s (set), 30k (riêng), +10k (phụ thu)"
          class="input-minimal w-full px-4 py-3 text-sm mb-4 resize-none"
          oninput="processBulkInput()"
        ></textarea>

        <div id="playerList" class="flex flex-wrap gap-2 min-h-[20px]">
          <!-- Tags injected here -->
        </div>
      </section>

      <!-- Section 3: Summary -->
      <section id="resultCard" class="hidden animate-fade mb-10">
        <div class="card p-6 mb-4">
          <div class="flex justify-between items-end mb-6">
            <div>
              <p
                class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1"
              >
                Tổng cộng
              </p>
              <h3 id="billTotal" class="text-3xl font-bold">0k</h3>
            </div>
            <div class="flex items-end gap-6 text-right">
              <div>
                <p
                  class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1"
                >
                  Nữ
                </p>
                <p
                  id="femalePriceDisplay"
                  class="text-lg font-semibold text-rose-700"
                >
                  60k
                </p>
              </div>
              <div>
                <p
                  class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1"
                >
                  Mỗi set
                </p>
                <p
                  id="setPriceDisplay"
                  class="text-lg font-semibold text-blue-700"
                >
                  12k
                </p>
              </div>
            </div>
          </div>

          <div class="space-y-3 pt-4 border-t border-slate-50">
            <div class="flex justify-between text-sm">
              <span class="text-slate-500">Mỗi Nam đóng:</span>
              <span id="maleFeeDisplay" class="font-bold text-lg">0k</span>
            </div>
          </div>
        </div>

        <button
          onclick="copySummary()"
          class="w-full bg-slate-900 text-white py-4 rounded-xl text-sm font-semibold hover:bg-black transition-all active:scale-[0.98]"
        >
          Sao chép bảng kê
        </button>
      </section>

      <!-- Footer Actions -->
      <div class="flex justify-center gap-8">
        <button
          id="btnReset"
          onclick="handleReset()"
          class="text-xs font-medium text-slate-400 hover:text-red-500 transition-colors uppercase"
        >
          Làm mới dữ liệu
        </button>
      </div>

      <!-- Config Sidebar -->
      <div
        id="configBackdrop"
        onclick="toggleConfigPanel(false)"
        class="hidden fixed inset-0 panel-backdrop z-40"
      ></div>
      <aside
        id="configPanel"
        class="hidden fixed left-0 top-0 h-full w-full max-w-sm sidebar-panel z-50 p-6 overflow-y-auto"
      >
        <div class="min-h-full flex flex-col">
          <div class="flex items-center justify-between mb-6">
            <h3
              class="text-sm font-semibold text-slate-600 uppercase tracking-wider"
            >
              Cấu hình
            </h3>
            <button
              onclick="toggleConfigPanel(false)"
              class="text-slate-400 hover:text-slate-700 text-xl leading-none"
            >
              &times;
            </button>
          </div>

          <div class="space-y-4">
            <div class="flex items-center justify-between">
              <label
                for="cfgRoundResult"
                class="block text-xs text-slate-500 mb-2"
                >Làm tròn kết quả</label
              >
              <label class="inline-flex items-center cursor-pointer">
                <input
                  type="checkbox"
                  id="cfgRoundResult"
                  class="form-checkbox h-5 w-5 text-blue-600"
                  checked
                  onchange="updateConfig()"
                />
                <span class="ml-2 text-xs text-slate-500">Bật</span>
              </label>
            </div>
            <div>
              <label
                for="cfgFemaleMax"
                class="block text-xs text-slate-500 mb-2"
                >Giá cố định cho nữ (k / buổi)</label
              >
              <input
                type="number"
                id="cfgFemaleMax"
                class="input-minimal px-4 py-3 text-sm font-medium w-full"
                value="60"
                min="0"
                oninput="
                  if (this.value !== '' && !isNaN(this.value)) updateConfig();
                "
                onblur="
                  if (this.value === '' || isNaN(this.value)) {
                    this.value = 0;
                    updateConfig();
                  }
                "
              />
            </div>
            <div>
              <label
                for="cfgTubePrice"
                class="block text-xs text-slate-500 mb-2"
                >Giá 1 ống cầu (12 trái) (k / ống)</label
              >
              <input
                type="number"
                id="cfgTubePrice"
                class="input-minimal px-4 py-3 text-sm font-medium w-full"
                value="290"
                min="0"
                oninput="
                  if (this.value !== '' && !isNaN(this.value)) updateConfig();
                "
                onblur="
                  if (this.value === '' || isNaN(this.value)) {
                    this.value = 0;
                    updateConfig();
                  }
                "
              />
            </div>
            <div>
              <label for="cfgSetPrice" class="block text-xs text-slate-500 mb-2"
                >Giá đánh theo set (k / set)</label
              >
              <input
                type="number"
                id="cfgSetPrice"
                class="input-minimal px-4 py-3 text-sm font-medium w-full"
                value="12"
                min="0"
                oninput="
                  if (this.value !== '' && !isNaN(this.value)) updateConfig();
                "
                onblur="
                  if (this.value === '' || isNaN(this.value)) {
                    this.value = 0;
                    updateConfig();
                  }
                "
              />
            </div>
          </div>

          <p class="text-xs text-slate-400 mt-6 leading-relaxed">
            Trường "Số cầu" ngoài màn hình chính sẽ tự quy đổi ra tiền cầu theo
            giá ống hiện tại.
          </p>

          <button
            onclick="openSessionsModal()"
            class="mt-5 w-full border border-slate-200 bg-white hover:bg-slate-50 text-slate-700 py-3 rounded-xl text-sm font-semibold transition-colors"
          >
            Lịch sử buổi gần đây
          </button>

          <p
            id="appVersionDisplay"
            class="mt-auto pt-8 text-[11px] text-slate-300 tracking-wide"
          >
            v0.0.0
          </p>
        </div>
      </aside>

      <div
        id="sessionsModal"
        class="hidden fixed inset-0 z-[60] bg-black/40 p-4 md:p-6"
      >
        <div
          class="mx-auto w-full max-w-lg bg-white rounded-2xl border border-slate-200 shadow-2xl flex flex-col max-h-[90vh]"
        >
          <div
            class="p-5 border-b border-slate-100 flex items-center justify-between"
          >
            <h4
              class="text-sm font-semibold text-slate-700 uppercase tracking-wider"
            >
              Lịch sử buổi gần đây
            </h4>
            <button
              onclick="closeSessionsModal()"
              class="text-slate-400 hover:text-slate-700 text-xl leading-none"
              aria-label="Đóng lịch sử"
            >
              &times;
            </button>
          </div>

          <div id="sessionsState" class="p-5 text-sm text-slate-500">
            Đang tải dữ liệu...
          </div>
          <div
            id="sessionsList"
            class="hidden p-5 overflow-y-auto space-y-3"
          ></div>
        </div>
      </div>
    </div>

    <script>
      window.BADGUY_ENV = {
        telegramBotToken: "__TELEGRAM_BOT_TOKEN__",
        telegramGroupChatId: "__TELEGRAM_GROUP_CHAT_ID__",
        firebaseApiKey: "__FIREBASE_API_KEY__",
        firebaseProjectId: "__FIREBASE_PROJECT_ID__",
        appVersion: "v1.0.0",
        femaleMax: "__FEMALE_MAX__",
        tubePrice: "__TUBE_PRICE__",
        setPrice: "__SET_PRICE__",
        shuttlesPerTube: "__SHUTTLES_PER_TUBE__",
        roundResult: "__ROUND_RESULT__",
      };
    </script>
    <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore-compat.js"></script>
    <script src="./assets/firebase.js"></script>
    <script src="./assets/app.js"></script>
  </body>
</html>
