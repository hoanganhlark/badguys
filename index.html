<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BadGuys Badminton - Set Management</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      body {
        background-color: #fafafa;
        font-family: "Plus Jakarta Sans", sans-serif;
        color: #1a1a1a;
        min-height: 100vh;
      }
      .card {
        background: #ffffff;
        border: 1px solid #f0f0f0;
        border-radius: 1rem;
        transition: all 0.2s ease;
      }
      .input-minimal {
        background-color: #f9fafb;
        border: 1px solid #e5e7eb;
        border-radius: 0.75rem;
        transition: all 0.2s ease;
      }
      .input-minimal:focus {
        outline: none;
        border-color: #1a1a1a;
        background-color: #fff;
      }
      .tag {
        transition: all 0.2s ease;
        cursor: pointer;
        user-select: none;
      }
      .tag-male {
        background-color: #f3f4f6;
        color: #374151;
        border: 1px solid #e5e7eb;
      }
      .tag-female {
        background-color: #fef2f2;
        color: #991b1b;
        border: 1px solid #fee2e2;
      }
      .tag-set {
        background-color: #eff6ff;
        color: #1d4ed8;
        border: 1px solid #dbeafe;
      }
      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(4px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }
      .animate-fade {
        animation: fadeIn 0.3s ease-out forwards;
      }
      .panel-backdrop {
        background: rgba(15, 23, 42, 0.3);
        backdrop-filter: blur(2px);
      }
      .sidebar-panel {
        background: #ffffff;
        border-right: 1px solid #f0f0f0;
        box-shadow: 12px 0 30px rgba(15, 23, 42, 0.08);
      }
    </style>
  </head>
  <body class="p-5 md:p-12 relative">
    <div class="max-w-md mx-auto">
      <button
        onclick="toggleConfigPanel(true)"
        aria-label="Mở cấu hình"
        class="fixed top-5 left-5 md:top-8 md:left-8 z-30 h-10 w-10 rounded-full border border-slate-200 bg-white text-slate-600 shadow-sm hover:bg-slate-50 transition-colors flex items-center justify-center"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          class="h-5 w-5"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M4.5 12a2.5 2.5 0 0 0 .6 1.62l-.06.14a2 2 0 0 0 .45 2.24l.3.3a2 2 0 0 0 2.24.45l.14-.06a2.5 2.5 0 0 0 3.24 1.47h1.18a2.5 2.5 0 0 0 3.24-1.47l.14.06a2 2 0 0 0 2.24-.45l.3-.3a2 2 0 0 0 .45-2.24l-.06-.14A2.5 2.5 0 0 0 19.5 12a2.5 2.5 0 0 0-.6-1.62l.06-.14a2 2 0 0 0-.45-2.24l-.3-.3a2 2 0 0 0-2.24-.45l-.14.06A2.5 2.5 0 0 0 12.59 5h-1.18a2.5 2.5 0 0 0-3.24 1.47l-.14-.06a2 2 0 0 0-2.24.45l-.3.3a2 2 0 0 0-.45 2.24l.06.14A2.5 2.5 0 0 0 4.5 12Z"
          />
          <circle cx="12" cy="12" r="3" />
        </svg>
      </button>

      <!-- Minimal Header -->
      <header class="mb-12 text-center">
        <h1 class="text-2xl font-bold tracking-tight text-slate-900">
          BadGuys<span class="text-slate-400">.</span>
        </h1>
        <p class="text-slate-400 text-xs uppercase tracking-widest mt-1">
          Cost Management
        </p>
      </header>

      <!-- Section 1: Expenses -->
      <section class="mb-8">
        <h2
          class="text-sm font-semibold text-slate-500 mb-4 px-1 uppercase tracking-wider"
        >
          Chi phí (k)
        </h2>
        <div class="grid grid-cols-2 gap-3">
          <input
            type="number"
            id="courtFee"
            placeholder="Tiền sân"
            class="input-minimal px-4 py-3 text-sm font-medium w-full"
            oninput="calculate()"
          />
          <input
            type="number"
            id="shuttleCount"
            placeholder="Số cầu"
            class="input-minimal px-4 py-3 text-sm font-medium w-full"
            oninput="calculate()"
          />
        </div>
      </section>

      <!-- Section 2: Players -->
      <section class="mb-8">
        <div class="flex justify-between items-center mb-4 px-1">
          <h2
            class="text-sm font-semibold text-slate-500 uppercase tracking-wider"
          >
            Danh sách
          </h2>
          <span id="playerCounter" class="text-xs font-medium text-slate-400"
            >0 người</span
          >
        </div>

        <textarea
          id="bulkInput"
          rows="4"
          placeholder="Nhập tên...&#10;Thêm 'n' cho nữ, '2s' cho 2 set..."
          class="input-minimal w-full px-4 py-3 text-sm mb-4 resize-none"
          oninput="processBulkInput()"
        ></textarea>

        <div id="playerList" class="flex flex-wrap gap-2 min-h-[20px]">
          <!-- Tags injected here -->
        </div>
      </section>

      <!-- Section 3: Summary -->
      <section id="resultCard" class="hidden animate-fade mb-10">
        <div class="card p-6 mb-4">
          <div class="flex justify-between items-end mb-6">
            <div>
              <p
                class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1"
              >
                Tổng cộng
              </p>
              <h3 id="billTotal" class="text-3xl font-bold">0k</h3>
            </div>
            <div class="flex items-end gap-6 text-right">
              <div>
                <p
                  class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1"
                >
                  Nữ
                </p>
                <p
                  id="femalePriceDisplay"
                  class="text-lg font-semibold text-rose-700"
                >
                  60k
                </p>
              </div>
              <div>
                <p
                  class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-1"
                >
                  Mỗi set
                </p>
                <p
                  id="setPriceDisplay"
                  class="text-lg font-semibold text-blue-700"
                >
                  12k
                </p>
              </div>
            </div>
          </div>

          <div class="space-y-3 pt-4 border-t border-slate-50">
            <div class="flex justify-between text-sm">
              <span class="text-slate-500">Mỗi Nam đóng:</span>
              <span id="maleFeeDisplay" class="font-bold text-lg">0k</span>
            </div>
          </div>
        </div>

        <button
          onclick="copySummary()"
          class="w-full bg-slate-900 text-white py-4 rounded-xl text-sm font-semibold hover:bg-black transition-all active:scale-[0.98]"
        >
          Sao chép bảng kê
        </button>
      </section>

      <!-- Footer Actions -->
      <div class="flex justify-center gap-8">
        <button
          id="btnReset"
          onclick="handleReset()"
          class="text-xs font-medium text-slate-400 hover:text-red-500 transition-colors uppercase"
        >
          Làm mới dữ liệu
        </button>
      </div>

      <!-- Notification -->
      <div
        id="toast"
        class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-slate-900 text-white text-[13px] px-5 py-3 rounded-full shadow-xl opacity-0 transition-all duration-300 pointer-events-none"
      >
        Đã sao chép!
      </div>

      <!-- Config Sidebar -->
      <div
        id="configBackdrop"
        onclick="toggleConfigPanel(false)"
        class="hidden fixed inset-0 panel-backdrop z-40"
      ></div>
      <aside
        id="configPanel"
        class="hidden fixed left-0 top-0 h-full w-full max-w-sm sidebar-panel z-50 p-6 overflow-y-auto"
      >
        <div class="min-h-full flex flex-col">
          <div class="flex items-center justify-between mb-6">
            <h3
              class="text-sm font-semibold text-slate-600 uppercase tracking-wider"
            >
              Cấu hình
            </h3>
            <button
              onclick="toggleConfigPanel(false)"
              class="text-slate-400 hover:text-slate-700 text-xl leading-none"
            >
              &times;
            </button>
          </div>

          <div class="space-y-4">
            <div>
              <label
                for="cfgFemaleMax"
                class="block text-xs text-slate-500 mb-2"
                >Giá cố định cho nữ (k / buổi)</label
              >
              <input
                type="number"
                id="cfgFemaleMax"
                class="input-minimal px-4 py-3 text-sm font-medium w-full"
                value="60"
                min="0"
                oninput="updateConfig()"
              />
            </div>
            <div>
              <label
                for="cfgTubePrice"
                class="block text-xs text-slate-500 mb-2"
                >Giá 1 ống cầu (12 trái) (k / ống)</label
              >
              <input
                type="number"
                id="cfgTubePrice"
                class="input-minimal px-4 py-3 text-sm font-medium w-full"
                value="290"
                min="0"
                oninput="updateConfig()"
              />
            </div>
            <div>
              <label for="cfgSetPrice" class="block text-xs text-slate-500 mb-2"
                >Giá đánh theo set (k / set)</label
              >
              <input
                type="number"
                id="cfgSetPrice"
                class="input-minimal px-4 py-3 text-sm font-medium w-full"
                value="12"
                min="0"
                oninput="updateConfig()"
              />
            </div>
          </div>

          <p class="text-xs text-slate-400 mt-6 leading-relaxed">
            Trường "Số cầu" ngoài màn hình chính sẽ tự quy đổi ra tiền cầu theo
            giá ống hiện tại.
          </p>

          <p
            id="appVersionDisplay"
            class="mt-auto pt-8 text-[11px] text-slate-300 tracking-wide"
          >
            v0.0.0
          </p>
        </div>
      </aside>
    </div>

    <script>
      let players = [];
      const APP_VERSION = "v1.0.0";
      const DEFAULT_CONFIG = {
        femaleMax: 60,
        tubePrice: 290,
        setPrice: 12,
        shuttlesPerTube: 12,
      };
      let config = { ...DEFAULT_CONFIG };
      let resetTimer = null;

      function formatK(value) {
        const rounded = Math.round(value * 10) / 10;
        return Number.isInteger(rounded)
          ? `${rounded}k`
          : `${rounded.toFixed(1)}k`;
      }

      function toggleConfigPanel(show) {
        const panel = document.getElementById("configPanel");
        const backdrop = document.getElementById("configBackdrop");
        panel.classList.toggle("hidden", !show);
        backdrop.classList.toggle("hidden", !show);
      }

      function saveConfig() {
        localStorage.setItem("badguyConfig", JSON.stringify(config));
      }

      function loadConfig() {
        const raw = localStorage.getItem("badguyConfig");
        if (!raw) return;
        try {
          const stored = JSON.parse(raw);
          config = {
            femaleMax: Number(stored.femaleMax) || DEFAULT_CONFIG.femaleMax,
            tubePrice: Number(stored.tubePrice) || DEFAULT_CONFIG.tubePrice,
            setPrice: Number(stored.setPrice) || DEFAULT_CONFIG.setPrice,
            shuttlesPerTube: DEFAULT_CONFIG.shuttlesPerTube,
          };
        } catch {
          config = { ...DEFAULT_CONFIG };
        }
      }

      function syncConfigInputs() {
        document.getElementById("cfgFemaleMax").value = config.femaleMax;
        document.getElementById("cfgTubePrice").value = config.tubePrice;
        document.getElementById("cfgSetPrice").value = config.setPrice;
        document.getElementById("setPriceDisplay").innerText = formatK(
          config.setPrice,
        );
        document.getElementById("femalePriceDisplay").innerText = formatK(
          config.femaleMax,
        );
      }

      function updateConfig() {
        config.femaleMax = Math.max(
          0,
          parseFloat(document.getElementById("cfgFemaleMax").value) || 0,
        );
        config.tubePrice = Math.max(
          0,
          parseFloat(document.getElementById("cfgTubePrice").value) || 0,
        );
        config.setPrice = Math.max(
          0,
          parseFloat(document.getElementById("cfgSetPrice").value) || 0,
        );
        syncConfigInputs();
        saveConfig();
        calculate();
      }

      function processBulkInput() {
        const inputEl = document.getElementById("bulkInput");
        const lines = inputEl.value.split("\n");
        const newPlayers = [];

        lines.forEach((line) => {
          let rawName = line.trim();
          if (!rawName) return;

          let isFemale = false;
          let sets = 0;

          // Check for female ' n' suffix
          if (rawName.toLowerCase().endsWith(" n")) {
            isFemale = true;
            rawName = rawName.substring(0, rawName.length - 2).trim();
          }

          // Check for set ' 2s' suffix
          const setMatch = rawName.toLowerCase().match(/\s(\d+)s$/);
          if (setMatch) {
            sets = parseInt(setMatch[1]);
            rawName = rawName.replace(setMatch[0], "").trim();
          }

          if (rawName) {
            newPlayers.push({ name: rawName, isFemale: isFemale, sets: sets });
          }
        });

        players = newPlayers;
        renderPlayers();
        calculate();
      }

      function toggleGender(index) {
        // Cycle through: Male -> Female -> Set 1s -> Male
        const p = players[index];
        if (!p.isFemale && p.sets === 0) {
          p.isFemale = true;
        } else if (p.isFemale) {
          p.isFemale = false;
          p.sets = 1;
        } else {
          p.sets = 0;
        }
        updateTextAreaFromPlayers();
        renderPlayers();
        calculate();
      }

      function removePlayer(index, event) {
        event.stopPropagation();
        players.splice(index, 1);
        updateTextAreaFromPlayers();
        renderPlayers();
        calculate();
      }

      function updateTextAreaFromPlayers() {
        const inputEl = document.getElementById("bulkInput");
        inputEl.value = players
          .map((p) => {
            let suffix = "";
            if (p.sets > 0) suffix += ` ${p.sets}s`;
            if (p.isFemale) suffix += " n";
            return p.name + suffix;
          })
          .join("\n");
      }

      function renderPlayers() {
        const list = document.getElementById("playerList");
        const counter = document.getElementById("playerCounter");
        list.innerHTML = "";

        if (players.length === 0) {
          counter.innerText = "0 người";
          return;
        }

        players.forEach((player, index) => {
          const tag = document.createElement("div");
          let typeClass = "tag-male";
          let label = player.name;

          if (player.sets > 0) {
            typeClass = "tag-set";
            label += ` (${player.sets}s)`;
          } else if (player.isFemale) {
            typeClass = "tag-female";
            label += " (n)";
          }

          tag.className = `tag ${typeClass} px-3 py-1.5 rounded-lg text-xs font-semibold flex items-center animate-fade`;
          tag.onclick = () => toggleGender(index);
          tag.innerHTML = `
                    <span class="mr-1.5 opacity-40">#</span>
                    <span>${label}</span>
                    <button onclick="removePlayer(${index}, event)" class="ml-2 opacity-40 hover:opacity-100">&times;</button>
                `;
          list.appendChild(tag);
        });
        counter.innerText = `${players.length} người`;
      }

      let lastResult = {
        fFee: 0,
        mFee: 0,
        total: 0,
        setTotal: 0,
        setPlayersCount: 0,
      };

      function calculate() {
        const court =
          parseFloat(document.getElementById("courtFee").value) || 0;
        const shuttleCount =
          parseFloat(document.getElementById("shuttleCount").value) || 0;
        const shuttle =
          (shuttleCount * config.tubePrice) / config.shuttlesPerTube;
        const total = court + shuttle;

        if (players.length === 0 || total === 0) {
          document.getElementById("resultCard").classList.add("hidden");
          return;
        }

        const setPlayers = players.filter((p) => p.sets > 0);
        const nonSetPlayers = players.filter((p) => p.sets === 0);
        const females = nonSetPlayers.filter((p) => p.isFemale);
        const males = nonSetPlayers.filter((p) => !p.isFemale);

        // Calculate revenue from set players
        let totalSetRevenue = 0;
        setPlayers.forEach((p) => {
          totalSetRevenue += p.sets * config.setPrice;
        });

        const remainingTotal = total - totalSetRevenue;
        let fFee = 0,
          mFee = 0;

        if (nonSetPlayers.length > 0) {
          const avg = remainingTotal / nonSetPlayers.length;
          if (avg <= config.femaleMax || males.length === 0) {
            fFee = Math.ceil(avg);
            mFee = fFee;
          } else {
            fFee = config.femaleMax;
            mFee = Math.ceil(
              (remainingTotal - fFee * females.length) / males.length,
            );
          }
        }

        lastResult = {
          fFee: fFee,
          mFee: mFee,
          total: total,
          setTotal: totalSetRevenue,
          setPlayersCount: setPlayers.length,
          femalesCount: females.length,
          malesCount: males.length,
        };

        document.getElementById("billTotal").innerText = formatK(total);
        document.getElementById("maleFeeDisplay").innerText = mFee + "k";
        document.getElementById("resultCard").classList.remove("hidden");
      }

      function copySummary() {
        const { fFee, mFee, total, malesCount, femalesCount } = lastResult;
        const court =
          parseFloat(document.getElementById("courtFee").value) || 0;
        const shuttleCount =
          parseFloat(document.getElementById("shuttleCount").value) || 0;
        const shuttle =
          (shuttleCount * config.tubePrice) / config.shuttlesPerTube;

        const setPlayers = players.filter((p) => p.sets > 0);
        const nonSetPlayers = players.filter((p) => p.sets === 0);
        const males = nonSetPlayers.filter((p) => !p.isFemale);
        const females = nonSetPlayers.filter((p) => p.isFemale);

        // 1. Dòng tiêu đề đầu tiên
        let text = `NAY CHƠI ${mFee}K / NGƯỜI\n\u200B\n`;

        // 2. Dòng tóm tắt tổng hợp
        let summaryParts = [];
        if (malesCount > 0) summaryParts.push(`${malesCount} người chia đều`);
        if (femalesCount > 0)
          summaryParts.push(`${femalesCount} nữ ${fFee * femalesCount}K`);
        if (setPlayers.length > 0) {
          const totalSetMoney = setPlayers.reduce(
            (sum, p) => sum + p.sets * config.setPrice,
            0,
          );
          summaryParts.push(`${setPlayers.length} đánh ít ${totalSetMoney}K`);
        }

        text += summaryParts.join(" + ") + "\n";
        text += `${formatK(court)} tiền sân + ${formatK(shuttle)} tiền cầu (${shuttleCount} trái) = ${formatK(total)} tổng cộng\n\u200B\n`;

        // 3. Danh sách chi tiết Players
        text += `Players:\n\u200B\n`;

        let count = 1;

        // Danh sách Nam (chia đều - không hiện giá tiền)
        males.forEach((p) => {
          text += `${count}. ${p.name}\n`;
          count++;
        });

        // Danh sách Nữ
        females.forEach((p) => {
          text += `${count}. ${p.name} ${fFee}K\n`;
          count++;
        });

        // Danh sách người đánh theo set
        setPlayers.forEach((p) => {
          text += `${count}. ${p.name} ${p.sets * config.setPrice}K (${p.sets} set)\n`;
          count++;
        });

        // Thực hiện copy vào clipboard
        if (navigator.clipboard && navigator.clipboard.writeText) {
          navigator.clipboard.writeText(text).then(() => {
            showToast("Đã sao chép bảng kê! ✨");
          });
        } else {
          // Fallback cho các trình duyệt cũ
          const el = document.createElement("textarea");
          el.value = text;
          document.body.appendChild(el);
          el.select();
          document.execCommand("copy");
          document.body.removeChild(el);
          showToast("Đã sao chép bảng kê! ✨");
        }
      }

      function handleReset() {
        const btn = document.getElementById("btnReset");
        if (resetTimer) {
          clearTimeout(resetTimer);
          resetTimer = null;
          document.getElementById("courtFee").value = "";
          document.getElementById("shuttleCount").value = "";
          document.getElementById("bulkInput").value = "";
          players = [];
          renderPlayers();
          document.getElementById("resultCard").classList.add("hidden");
          btn.innerText = "LÀM MỚI DỮ LIỆU";
          btn.classList.replace("text-red-600", "text-slate-400");
          showToast("Dữ liệu đã được xóa.");
        } else {
          btn.innerText = "XÁC NHẬN XÓA?";
          btn.classList.replace("text-slate-400", "text-red-600");
          resetTimer = setTimeout(() => {
            btn.innerText = "LÀM MỚI DỮ LIỆU";
            btn.classList.replace("text-red-600", "text-slate-400");
            resetTimer = null;
          }, 2000);
        }
      }

      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.innerText = msg;
        toast.classList.remove("opacity-0");
        toast.classList.add("opacity-100");
        setTimeout(() => {
          toast.classList.replace("opacity-100", "opacity-0");
        }, 2000);
      }

      loadConfig();
      syncConfigInputs();
    </script>
  </body>
</html>
